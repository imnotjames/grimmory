name: Release - Publish Stable Images

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'The release tag to publish (for example v2.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'The release commit SHA to package; if omitted, the tag ref is checked out'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The existing release tag to publish (for example v2.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'Optional release commit SHA override'
        required: false
        default: ''
        type: string

jobs:
  build-and-release:
    name: Build, Publish, and Finalize Stable Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || format('refs/tags/{0}', inputs.release_tag) }}

      - name: Record Release Tag and Commit
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "Stable release tag: ${RELEASE_TAG}"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Stable image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grimmory/grimmory:${{ env.release_tag }}
            grimmory/grimmory:latest
            ghcr.io/grimmory-tools/grimmory:${{ env.release_tag }}
            ghcr.io/grimmory-tools/grimmory:latest
          build-args: |
            APP_VERSION=${{ env.release_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max

      - name: Publish Draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          RELEASE_TAG: ${{ env.release_tag }}
        run: |
          gh release edit "${RELEASE_TAG}" --draft=false
