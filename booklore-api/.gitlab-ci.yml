#   rules:
#     - if: '$CI_PIPELINE_SOURCE == "schedule"'
#       when: never
#     - if: "$CI_COMMIT_TAG"
#       when: never
#     - when: on_success

gradle-build:
  tags:
    - universal
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: never
    - when: on_success

gradle-sonar:
  rules:
    - when: never

