workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
      when: always
    - when: never

include:
  # - component: "$CI_SERVER_FQDN/to-be-continuous/gitleaks/gitlab-ci-gitleaks@2.9"
  # Spectral disabled - no static OpenAPI/AsyncAPI specs to lint
  # - component: "$CI_SERVER_FQDN/to-be-continuous/sqlfluff/gitlab-ci-sqlfluff@1.6"
  #   inputs:
  #     lint-args: "--dialect mariadb"
  - component: "$CI_SERVER_FQDN/to-be-continuous/gradle/gitlab-ci-gradle@2.13.1"
    inputs:
      image: "eclipse-temurin:25-jdk"
      cli-bin: "./gradlew"
      project-dir: "booklore-api"
      daemon: false
      build-args: "test jacocoTestReport --no-daemon --parallel"
      dependency-check-disabled: true
      sbom-disabled: true
      no-publish: true
